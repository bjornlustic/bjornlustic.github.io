<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
  box-sizing: border-box;
}

.row {
  display: -ms-flexbox; /* IE 10 */
  display: flex;
  -ms-flex-wrap: wrap; /* IE 10 */
  flex-wrap: wrap;
  padding: 0 12px;
}

/* Create two equal columns that sits next to each other */
.column {
  -ms-flex: 25%; /* IE 10 */
  flex: 25%;
  padding: 0 0px;
}

.column img {
  margin-top: 6px;
  vertical-align: middle;
}

</style>
</head>
<body>

<!-- Photo Grid -->
<div class="row"> 
  <div class="column">
    <img src="../images/bjorngallery1.jpg" style="width:100%">
    <img src="../images/bjorngallery2.jpg" style="width:100%">
    <img src="../images/bjorngallery3.jpg" style="width:100%">
   
  </div>
  <div class="column">
    <img src="../images/bjorngallery4.jpg" style="width:100%">
    <img src="../images/bjorngallery5.jpg" style="width:100%">
    <img src="../images/bjorngallery6.jpg" style="width:100%">
    
  </div>  
  <div class="column">
    <img src="../images/bjorngallery7.jpg" style="width:100%">
    <img src="../images/bjorngallery8.jpg" style="width:100%">
    <img src="../images/bjorngallery9.jpg" style="width:100%">
    
  </div>
  <div class="column">
    <img src="../images/bjorngallery10.jpg" style="width:100%">
    <img src="../images/bjorngallery11.jpg" style="width:100%">
    <img src="../images/bjorngallery12.jpg" style="width:100%">
    
  </div>
</div>

</body>
</html>
